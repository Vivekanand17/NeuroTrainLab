# Render Blueprint — set env vars in the dashboard after first deploy.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: neurotrain-lab-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

staticSites:
  - name: neurotrain-lab-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
